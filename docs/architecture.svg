<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3ea6ff"/><stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <style>
      .lbl{fill:#cdd9ec;font-size:13px}
      .box{rx:10;stroke:#1f2a3d}
      .t{fill:#e6edf6;font-weight:700;font-size:14px}
      .s{fill:#8c9bb5;font-size:11px}
      .layer{fill:#7c8aa3;font-size:12px;font-weight:700;letter-spacing:2px}
    </style>
  </defs>
  <rect width="1100" height="760" fill="#0a0e17"/>
  <text x="40" y="44" fill="#fff" font-size="26" font-weight="800">PRAHARI — Architecture</text>
  <text x="40" y="68" class="s" font-size="13">AI-powered Digital Public Safety Intelligence Platform · multi-source fusion</text>

  <!-- Sources -->
  <text x="40" y="110" class="layer">DATA SOURCES</text>
  <g>
    <rect x="40"  y="124" width="230" height="58" class="box" fill="#0e1b2c"/>
    <text x="56" y="150" class="t">📞 Telecom / CDR / Call metadata</text>
    <text x="56" y="170" class="s">spoofing, VoIP, AI-voice, number rotation</text>
    <rect x="290" y="124" width="230" height="58" class="box" fill="#0e1b2c"/>
    <text x="306" y="150" class="t">🏦 Bank STR / Transaction feeds</text>
    <text x="306" y="170" class="s">mule accounts, UPI handles, transfers</text>
    <rect x="540" y="124" width="230" height="58" class="box" fill="#0e1b2c"/>
    <text x="556" y="150" class="t">📋 NCRP / 1930 complaints</text>
    <text x="556" y="170" class="s">victim reports, scam scripts</text>
    <rect x="790" y="124" width="270" height="58" class="box" fill="#0e1b2c"/>
    <text x="806" y="150" class="t">💵 FICN seizures · Note images</text>
    <text x="806" y="170" class="s">counterfeit logs, teller/POS captures</text>
  </g>

  <!-- Fusion core -->
  <text x="40" y="230" class="layer">INTELLIGENCE FUSION CORE (Agentic AI)</text>
  <rect x="40" y="244" width="1020" height="70" rx="12" fill="url(#g1)"/>
  <text x="60" y="278" fill="#fff" font-weight="800" font-size="17">🧠 Agentic Fusion &amp; Orchestration</text>
  <text x="60" y="300" fill="#eaf2ff" font-size="12">entity resolution · cross-source correlation · evidence hashing (SHA-256) · alert routing · audit log</text>

  <!-- Modules -->
  <text x="40" y="360" class="layer">AI MODULES</text>
  <g>
    <rect x="40"  y="374" width="195" height="78" class="box" fill="#15212e"/>
    <text x="54" y="398" class="t" fill="#8fe3c4">Scam NLP Classifier</text>
    <text x="54" y="418" class="s">kill-chain signal model</text>
    <text x="54" y="434" class="s">explainable, calibrated</text>

    <rect x="247" y="374" width="195" height="78" class="box" fill="#15212e"/>
    <text x="261" y="398" class="t" fill="#8fe3c4">Counterfeit CV</text>
    <text x="261" y="418" class="s">7-feature forensics</text>
    <text x="261" y="434" class="s">all denominations</text>

    <rect x="454" y="374" width="195" height="78" class="box" fill="#15212e"/>
    <text x="468" y="398" class="t" fill="#8fe3c4">Fraud Graph AI</text>
    <text x="468" y="418" class="s">campaign clustering</text>
    <text x="468" y="434" class="s">kingpin + lead-time</text>

    <rect x="661" y="374" width="195" height="78" class="box" fill="#15212e"/>
    <text x="675" y="398" class="t" fill="#8fe3c4">Geospatial AI</text>
    <text x="675" y="418" class="s">hotspot density</text>
    <text x="675" y="434" class="s">patrol priority</text>

    <rect x="868" y="374" width="192" height="78" class="box" fill="#15212e"/>
    <text x="882" y="398" class="t" fill="#8fe3c4">Citizen Shield Bot</text>
    <text x="882" y="418" class="s">12 languages</text>
    <text x="882" y="434" class="s">WhatsApp/IVR/app</text>
  </g>

  <!-- Actions -->
  <text x="40" y="500" class="layer">ACTION &amp; RESPONSE</text>
  <g>
    <rect x="40"  y="514" width="320" height="62" class="box" fill="#2a1622"/>
    <text x="56" y="540" class="t" fill="#ffb3b8">⚠ MHA / I4C alert (tamper-evident package)</text>
    <text x="56" y="560" class="s">auto-filed before money transfer · court-admissible</text>
    <rect x="380" y="514" width="320" height="62" class="box" fill="#2a1622"/>
    <text x="396" y="540" class="t" fill="#ffb3b8">👮 Command-centre dispatch</text>
    <text x="396" y="560" class="s">patrol routing · inter-district sharing</text>
    <rect x="720" y="514" width="340" height="62" class="box" fill="#2a1622"/>
    <text x="736" y="540" class="t" fill="#ffb3b8">📱 Real-time citizen warning + 1930 report</text>
    <text x="736" y="560" class="s">in-call interception · transfer hold</text>
  </g>

  <!-- Consumers -->
  <text x="40" y="624" class="layer">CONSUMERS</text>
  <g>
    <rect x="40"  y="638" width="240" height="50" class="box" fill="#101a2b"/>
    <text x="56" y="668" class="t">Law Enforcement / I4C</text>
    <rect x="300" y="638" width="240" height="50" class="box" fill="#101a2b"/>
    <text x="316" y="668" class="t">Banks / Telecom (TSP)</text>
    <rect x="560" y="638" width="240" height="50" class="box" fill="#101a2b"/>
    <text x="576" y="668" class="t">Citizens</text>
    <rect x="820" y="638" width="240" height="50" class="box" fill="#101a2b"/>
    <text x="836" y="668" class="t">Courts (evidence)</text>
  </g>

  <!-- flow arrows -->
  <g stroke="#34507a" stroke-width="2" fill="none" marker-end="url(#a)">
    <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#34507a"/></marker></defs>
    <line x1="550" y1="186" x2="550" y2="240"/>
    <line x1="550" y1="316" x2="550" y2="370"/>
    <line x1="550" y1="456" x2="550" y2="510"/>
    <line x1="550" y1="580" x2="550" y2="634"/>
  </g>
  <text x="40" y="724" class="s">Synthetic demo data only. Privacy-by-design: PII tokenised at ingest; every intelligence package carries a SHA-256 evidence hash and immutable audit trail.</text>
</svg>
